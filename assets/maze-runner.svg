<svg width="960" height="360" viewBox="0 0 960 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated arcade maze runner">
  <defs>
    <clipPath id="screenClip">
      <rect x="40" y="40" width="880" height="280" rx="18"/>
    </clipPath>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- frame -->
  <rect x="20" y="20" width="920" height="320" rx="20" fill="#0D1117" stroke="#30363D" stroke-width="2"/>
  <rect x="40" y="40" width="880" height="280" rx="18" fill="#0B0F14" stroke="#21262D"/>

  <!-- title bar -->
  <rect x="40" y="40" width="880" height="28" rx="18" fill="#161B22"/>
  <text x="60" y="58" fill="#8B949E" font-size="13" font-family="JetBrains Mono, Consolas, monospace">maze-runner</text>
  <text x="840" y="58" fill="#3FB950" font-size="12" font-family="JetBrains Mono, Consolas, monospace">READY</text>

  <g clip-path="url(#screenClip)">
    <!-- subtle scan lines -->
    <g opacity="0.07">
      <rect x="40" y="84" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="102" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="120" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="138" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="156" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="174" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="192" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="210" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="228" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="246" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="264" width="880" height="1" fill="#F0F6FC"/>
      <rect x="40" y="282" width="880" height="1" fill="#F0F6FC"/>
    </g>

    <!-- maze walls -->
    <g stroke="#58A6FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <rect x="90" y="95" width="780" height="170" rx="18"/>
      <rect x="130" y="130" width="150" height="50" rx="10"/>
      <rect x="340" y="130" width="120" height="50" rx="10"/>
      <rect x="500" y="130" width="120" height="50" rx="10"/>
      <rect x="680" y="130" width="140" height="50" rx="10"/>

      <rect x="165" y="205" width="120" height="35" rx="10"/>
      <rect x="360" y="205" width="240" height="35" rx="10"/>
      <rect x="675" y="205" width="110" height="35" rx="10"/>

      <line x1="90" y1="180" x2="130" y2="180"/>
      <line x1="280" y1="180" x2="340" y2="180"/>
      <line x1="460" y1="180" x2="500" y2="180"/>
      <line x1="620" y1="180" x2="680" y2="180"/>
      <line x1="820" y1="180" x2="870" y2="180"/>
    </g>

    <!-- dots -->
    <g fill="#D29922">
      <circle cx="110" cy="180" r="3"/>
      <circle cx="150" cy="180" r="3"/>
      <circle cx="190" cy="180" r="3"/>
      <circle cx="230" cy="180" r="3"/>
      <circle cx="310" cy="180" r="3"/>
      <circle cx="390" cy="180" r="3"/>
      <circle cx="430" cy="180" r="3"/>
      <circle cx="480" cy="180" r="3"/>
      <circle cx="550" cy="180" r="3"/>
      <circle cx="590" cy="180" r="3"/>
      <circle cx="650" cy="180" r="3"/>
      <circle cx="710" cy="180" r="3"/>
      <circle cx="750" cy="180" r="3"/>
      <circle cx="790" cy="180" r="3"/>
      <circle cx="840" cy="180" r="3"/>
    </g>

    <!-- bigger pellets -->
    <g fill="#F2CC60" filter="url(#softGlow)">
      <circle cx="110" cy="180" r="6">
        <animate attributeName="opacity" values="1;0.35;1" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="840" cy="180" r="6">
        <animate attributeName="opacity" values="1;0.35;1" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- runner -->
    <g filter="url(#softGlow)">
      <!-- body -->
      <path d="M0,-16 A16,16 0 1,1 0,16 L6,0 Z" fill="#F2CC60">
        <animate attributeName="d"
          values="
            M0,-16 A16,16 0 1,1 0,16 L6,0 Z;
            M0,-16 A16,16 0 1,1 -12,8 L6,0 Z;
            M0,-16 A16,16 0 1,1 0,16 L6,0 Z;
            M0,-16 A16,16 0 1,1 -12,8 L6,0 Z;
            M0,-16 A16,16 0 1,1 0,16 L6,0 Z"
          dur="0.35s"
          repeatCount="indefinite"/>
        <animateMotion dur="8s" repeatCount="indefinite"
          path="M110 180 H840 H840 H110"/>
      </path>
    </g>

    <!-- enemy 1 -->
    <g transform="translate(620 215)" filter="url(#softGlow)">
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="620 215; 740 215; 620 215"
          dur="4.2s" repeatCount="indefinite"/>
        <path d="M0,0 C0,-16 12,-24 24,-24 C36,-24 48,-16 48,0 V24 L40,18 L32,24 L24,18 L16,24 L8,18 L0,24 Z"
          fill="#F85149"/>
        <circle cx="17" cy="-6" r="6" fill="#F0F6FC"/>
        <circle cx="31" cy="-6" r="6" fill="#F0F6FC"/>
        <circle cx="19" cy="-6" r="2.5" fill="#0D1117"/>
        <circle cx="33" cy="-6" r="2.5" fill="#0D1117"/>
      </g>
    </g>

    <!-- enemy 2 -->
    <g transform="translate(190 215)" filter="url(#softGlow)">
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="190 215; 270 215; 190 215"
          dur="3.6s" repeatCount="indefinite"/>
        <path d="M0,0 C0,-16 12,-24 24,-24 C36,-24 48,-16 48,0 V24 L40,18 L32,24 L24,18 L16,24 L8,18 L0,24 Z"
          fill="#A371F7"/>
        <circle cx="17" cy="-6" r="6" fill="#F0F6FC"/>
        <circle cx="31" cy="-6" r="6" fill="#F0F6FC"/>
        <circle cx="19" cy="-6" r="2.5" fill="#0D1117"/>
        <circle cx="33" cy="-6" r="2.5" fill="#0D1117"/>
      </g>
    </g>

    <!-- lower status -->
    <text x="95" y="295" fill="#8B949E" font-size="12" font-family="JetBrains Mono, Consolas, monospace">score</text>
    <text x="145" y="295" fill="#C9D1D9" font-size="12" font-family="JetBrains Mono, Consolas, monospace">01337</text>

    <text x="420" y="295" fill="#8B949E" font-size="12" font-family="JetBrains Mono, Consolas, monospace">press start</text>
    <text x="785" y="295" fill="#8B949E" font-size="12" font-family="JetBrains Mono, Consolas, monospace">lives</text>

    <g fill="#F2CC60">
      <circle cx="840" cy="292" r="6"/>
      <circle cx="858" cy="292" r="6"/>
      <circle cx="876" cy="292" r="6"/>
    </g>
  </g>
</svg>
